<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我 - 我的專題網站</title>
    <style>
        /* 1. 修改背景顏色 (與首頁一致的淡粉色) */
        body { 
            font-family: "Noto Serif TC', "Apple LiSung", "新細明體", serif;
            text-align: center; 
            padding: 40px 20px; 
            letter-spacing: 0.1em;
            line-height: 1.2;
            background-color: #f6b9d1; /* 淡粉色 */
            color: #333;
            margin: 0;
        }
        p {line-height: 0.3;}
       
h2 {
    /* 1. 置中對齊 */
    text-align: center; 
    
    /* 2. 放大字體 (3rem 大約是原本字體的 3 倍) */
    font-size: 3.5rem; 
    
    /* 3. 調整字體權重（粗細） */
    font-weight: 700; 
    
    /* 4. 增加上下間距，讓它不要跟下面的字擠在一起 */
    margin-top: 40px;
    margin-bottom: 50px;
    
    /* 5. 顏色建議稍微深一點，更有層次感 */
    color: #5a4a42; 
    
    /* 6. 套用剛才說的思源宋體 */
    font-family: 'Noto Serif TC', serif;
}

        /* 內容容器：讓文字不要散開，集中在中間 */
        .content-box {
            max-width: 600px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.8); /* 半透明白色 */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;          /* 啟動 Flexbox */
            flex-direction: column; /* 讓內容由上而下排列 */
            align-items: center;    /* 水平置中所有內容（包括圖片和文字） */
            text-align: center;      /* 文字本身也置中 */
        }

        /* 2. 圖片樣式 */
        .project-img {
            width: 100%;       /* 寬度自動填滿容器 */
            max-width: 150px;  /* 最大不超過 400px */
            height: auto;
            border-radius: 15px; /* 圖片也要圓角才好看 */
            
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 按鈕樣式 */
        .btn-back { 
            display: inline-block; 
            padding: 12px 25px; 
            background: #d63fd6; 
            color: white; 
            text-decoration: none; 
            border-radius: 25px; 
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-back:hover {
            background: #cb1287;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="content-box">

    </div>

</body>
</html>
